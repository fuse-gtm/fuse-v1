name: CI Utils

on:
  # it's usually not recommended to use pull_request_target
  # but we consider it's safe here if we keep the same steps
  # see: https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
  # and: https://github.com/facebook/react-native/pull/34370/files
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

permissions:
  checks: write
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # We don't cancel in-progress because this workflow is triggered on
  # pull_request_target, which means the ref can be the same accross two PRs.
  # cancel-in-progress: true

jobs:
  danger-js:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - name: Check PR diff size
        id: pr-diff-size
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.event.pull_request.head.sha }}
          changed_file_list="$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})"
          changed_files=$(printf '%s\n' "${changed_file_list}" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "changed-files=${changed_files}" >> "${GITHUB_OUTPUT}"
          if [ "${changed_files}" -gt 1000 ]; then
            echo "skip-danger=true" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping Danger because this PR changes ${changed_files} files."
          elif printf '%s\n' "${changed_file_list}" | grep -Ev '^\.github/workflows/cd-deploy-(main|tag)\.yaml$' | grep -q .; then
            echo "skip-danger=false" >> "${GITHUB_OUTPUT}"
          else
            echo "skip-danger=true" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping Danger because this PR only changes CD deploy workflow files."
          fi
      - name: Install dependencies
        if: steps.pr-diff-size.outputs.skip-danger != 'true'
        uses: ./.github/actions/yarn-install
      - name: Utils / Run Danger.js
        if: steps.pr-diff-size.outputs.skip-danger != 'true'
        run: cd packages/twenty-utils && npx nx danger:ci
        env:
          DANGER_GITHUB_API_TOKEN: ${{ github.token }}

  congratulate:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/yarn-install
      - name: Run congratulate-dangerfile.js
        run: cd packages/twenty-utils && npx nx danger:congratulate
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
