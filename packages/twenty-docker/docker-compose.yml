name: twenty

services:
  server:
    image: twentycrm/twenty:${TAG:-latest}
    mem_limit: 1536m
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    ports:
      - "3000:3000"
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/${PG_DATABASE_NAME:-default}
      SERVER_URL: ${SERVER_URL}
      FRONTEND_URL: ${FRONTEND_URL:-}
      IS_MULTIWORKSPACE_ENABLED: ${IS_MULTIWORKSPACE_ENABLED:-false}
      DEFAULT_SUBDOMAIN: ${DEFAULT_SUBDOMAIN:-app}
      IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: ${IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS:-true}
      IS_CONFIG_VARIABLES_IN_DB_ENABLED: ${IS_CONFIG_VARIABLES_IN_DB_ENABLED:-false}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-false}
      AI_TELEMETRY_ENABLED: ${AI_TELEMETRY_ENABLED:-false}
      ALLOW_REQUESTS_TO_TWENTY_ICONS: ${ALLOW_REQUESTS_TO_TWENTY_ICONS:-false}
      COMPANY_ENRICHMENT_ENABLED: ${COMPANY_ENRICHMENT_ENABLED:-false}
      COMPANY_ENRICHMENT_PROVIDER: ${COMPANY_ENRICHMENT_PROVIDER:-none}
      MARKETPLACE_REMOTE_FETCH_ENABLED: ${MARKETPLACE_REMOTE_FETCH_ENABLED:-false}
      ADMIN_VERSION_CHECK_ENABLED: ${ADMIN_VERSION_CHECK_ENABLED:-false}
      HELP_CENTER_SEARCH_ENABLED: ${HELP_CENTER_SEARCH_ENABLED:-false}
      HELP_CENTER_SEARCH_PROVIDER: ${HELP_CENTER_SEARCH_PROVIDER:-none}
      SUPPORT_DRIVER: ${SUPPORT_DRIVER:-none}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_DB_MIGRATIONS: ${DISABLE_DB_MIGRATIONS:-}
      DISABLE_CRON_JOBS_REGISTRATION: ${DISABLE_CRON_JOBS_REGISTRATION:-}
      CRON_REGISTRATION_TIMEOUT_SECONDS: ${CRON_REGISTRATION_TIMEOUT_SECONDS:-60}
      CRON_REGISTER_COMMAND_TIMEOUT_MS: ${CRON_REGISTER_COMMAND_TIMEOUT_MS:-5000}
      NODE_OPTIONS: --max-old-space-size=${SERVER_NODE_MAX_OLD_SPACE_MB:-1024}
      APP_VERSION: ${APP_VERSION:-0.0.0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_AI_SPEED_MODEL_ID: ${DEFAULT_AI_SPEED_MODEL_ID:-}
      DEFAULT_AI_PERFORMANCE_MODEL_ID: ${DEFAULT_AI_PERFORMANCE_MODEL_ID:-}

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_NAME: ${STORAGE_S3_NAME:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}

      APP_SECRET: ${APP_SECRET:-replace_me_with_a_random_string}
      MESSAGING_PROVIDER_GMAIL_ENABLED: ${MESSAGING_PROVIDER_GMAIL_ENABLED:-false}
      CALENDAR_PROVIDER_GOOGLE_ENABLED: ${CALENDAR_PROVIDER_GOOGLE_ENABLED:-false}
      AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-false}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      AUTH_GOOGLE_CALLBACK_URL: ${AUTH_GOOGLE_CALLBACK_URL:-}
      AUTH_GOOGLE_APIS_CALLBACK_URL: ${AUTH_GOOGLE_APIS_CALLBACK_URL:-}

      CALENDAR_PROVIDER_MICROSOFT_ENABLED: ${CALENDAR_PROVIDER_MICROSOFT_ENABLED:-false}
      MESSAGING_PROVIDER_MICROSOFT_ENABLED: ${MESSAGING_PROVIDER_MICROSOFT_ENABLED:-false}
      AUTH_MICROSOFT_ENABLED: ${AUTH_MICROSOFT_ENABLED:-false}
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID:-}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET:-}
      AUTH_MICROSOFT_CALLBACK_URL: ${AUTH_MICROSOFT_CALLBACK_URL:-}
      AUTH_MICROSOFT_APIS_CALLBACK_URL: ${AUTH_MICROSOFT_APIS_CALLBACK_URL:-}

      # EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-contact@yourdomain.com}
      # EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-"John from YourDomain"}
      # EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      # EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      # EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-465}
      # EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      # EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/readyz
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  worker:
    image: twentycrm/twenty:${TAG:-latest}
    mem_limit: 1024m
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/${PG_DATABASE_NAME:-default}
      SERVER_URL: ${SERVER_URL}
      FRONTEND_URL: ${FRONTEND_URL:-}
      IS_MULTIWORKSPACE_ENABLED: ${IS_MULTIWORKSPACE_ENABLED:-false}
      DEFAULT_SUBDOMAIN: ${DEFAULT_SUBDOMAIN:-app}
      IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: ${IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS:-true}
      IS_CONFIG_VARIABLES_IN_DB_ENABLED: ${IS_CONFIG_VARIABLES_IN_DB_ENABLED:-false}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-false}
      AI_TELEMETRY_ENABLED: ${AI_TELEMETRY_ENABLED:-false}
      ALLOW_REQUESTS_TO_TWENTY_ICONS: ${ALLOW_REQUESTS_TO_TWENTY_ICONS:-false}
      COMPANY_ENRICHMENT_ENABLED: ${COMPANY_ENRICHMENT_ENABLED:-false}
      COMPANY_ENRICHMENT_PROVIDER: ${COMPANY_ENRICHMENT_PROVIDER:-none}
      MARKETPLACE_REMOTE_FETCH_ENABLED: ${MARKETPLACE_REMOTE_FETCH_ENABLED:-false}
      ADMIN_VERSION_CHECK_ENABLED: ${ADMIN_VERSION_CHECK_ENABLED:-false}
      HELP_CENTER_SEARCH_ENABLED: ${HELP_CENTER_SEARCH_ENABLED:-false}
      HELP_CENTER_SEARCH_PROVIDER: ${HELP_CENTER_SEARCH_PROVIDER:-none}
      SUPPORT_DRIVER: ${SUPPORT_DRIVER:-none}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_DB_MIGRATIONS: "true" # it already runs on the server
      DISABLE_CRON_JOBS_REGISTRATION: "true" # it already runs on the server
      CRON_REGISTER_COMMAND_TIMEOUT_MS: ${CRON_REGISTER_COMMAND_TIMEOUT_MS:-5000}
      NODE_OPTIONS: --max-old-space-size=${WORKER_NODE_MAX_OLD_SPACE_MB:-768}
      APP_VERSION: ${APP_VERSION:-0.0.0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_AI_SPEED_MODEL_ID: ${DEFAULT_AI_SPEED_MODEL_ID:-}
      DEFAULT_AI_PERFORMANCE_MODEL_ID: ${DEFAULT_AI_PERFORMANCE_MODEL_ID:-}

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_NAME: ${STORAGE_S3_NAME:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}

      APP_SECRET: ${APP_SECRET:-replace_me_with_a_random_string}
      MESSAGING_PROVIDER_GMAIL_ENABLED: ${MESSAGING_PROVIDER_GMAIL_ENABLED:-false}
      CALENDAR_PROVIDER_GOOGLE_ENABLED: ${CALENDAR_PROVIDER_GOOGLE_ENABLED:-false}
      AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-false}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      AUTH_GOOGLE_CALLBACK_URL: ${AUTH_GOOGLE_CALLBACK_URL:-}
      AUTH_GOOGLE_APIS_CALLBACK_URL: ${AUTH_GOOGLE_APIS_CALLBACK_URL:-}

      CALENDAR_PROVIDER_MICROSOFT_ENABLED: ${CALENDAR_PROVIDER_MICROSOFT_ENABLED:-false}
      MESSAGING_PROVIDER_MICROSOFT_ENABLED: ${MESSAGING_PROVIDER_MICROSOFT_ENABLED:-false}
      AUTH_MICROSOFT_ENABLED: ${AUTH_MICROSOFT_ENABLED:-false}
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID:-}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET:-}
      AUTH_MICROSOFT_CALLBACK_URL: ${AUTH_MICROSOFT_CALLBACK_URL:-}
      AUTH_MICROSOFT_APIS_CALLBACK_URL: ${AUTH_MICROSOFT_APIS_CALLBACK_URL:-}

      # EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-contact@yourdomain.com}
      # EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-"John from YourDomain"}
      # EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      # EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      # EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-465}
      # EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      # EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}

    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PG_DATABASE_NAME:-default}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
    healthcheck:
      test: pg_isready -U ${PG_DATABASE_USER:-postgres} -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis
    restart: always
    command: ["--maxmemory", "512mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  server-local-data:
